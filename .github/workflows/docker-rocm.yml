name: Build & Push ROCm Image (MI300X)

on:
  push:
    branches: [main]
    tags: ["rocm-v*"]
    paths:
      - "docker-rocm/**"
      - ".github/workflows/docker-rocm.yml"
  pull_request:
    branches: [main]
    paths:
      - "docker-rocm/**"
      - ".github/workflows/docker-rocm.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-rocm

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ROCm base images are larger than CUDA (~11 GB uncompressed) and pip needs
      # room for the cache layer on top. Free everything we can before starting.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/powershell /usr/share/swift
          sudo apt-get purge -y '^llvm-.*' '^php.*' '^dotnet-.*' mono-devel || true
          sudo docker image prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=match,pattern=rocm-v(.*),group=1
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker-rocm
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=rocm
          cache-to: type=gha,mode=max,scope=rocm
